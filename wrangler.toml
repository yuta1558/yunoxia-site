# yunoxia.one - Cloudflare Pages Configuration
name = "yunoxia-site"
compatibility_date = "2024-09-23"
pages_build_output_dir = "."

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "yunoxia-blog"
database_id = "" # wrangler d1 create yunoxia-blog で作成後に設定

# R2 Bucket binding (画像アップロード用)
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "yunoxia-images"

# Environment variables (本番ではCloudflare Dashboardで設定)
[vars]
ADMIN_USERNAME = "admin"
# JWT_SECRET と ADMIN_PASSWORD_HASH は Cloudflare Dashboard の Secrets で設定
